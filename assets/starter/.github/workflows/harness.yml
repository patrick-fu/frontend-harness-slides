name: Slide Deck Harness

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs on the same branch so pushes/re-opened PRs don't waste CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules + Playwright browsers
        uses: actions/cache@v4
        id: cache-pw
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}-pw-v1-${{ hashFiles('package.json') }}

      - name: Install dependencies
        if: steps.cache-pw.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.cache-pw.outputs.cache-hit != 'true'
        env:
          PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
        run: npx playwright install chromium --with-deps

      - name: Build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run build

      - name: Run tests (auditor + visual + typecheck via build)
        env:
          CI: true
          PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
        run: npm run test:ci

      - name: Upload build + test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-artifacts-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
            dist/
          retention-days: 14
          if-no-files-found: ignore

      - name: Debug — dist/ listing on failure
        if: failure()
        run: ls -laR dist/ 2>/dev/null || echo "dist/ missing or empty"
